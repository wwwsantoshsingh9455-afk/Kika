<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL BREAKER: V12 STEALTH</title>
    <style>
        :root { --neon: #00ff41; --fail: #ff3131; --warn: #ffae00; --bg: #000; }
        body { 
            background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header Fix */
        .header-bar { 
            font-size: 0.75em; padding: 10px 15px; display: flex; justify-content: space-between; 
            border-bottom: 1px solid #1a1a1a; background: #050505; align-items: center;
        }
        
        .settings-icon { 
            background: #222; padding: 4px 8px; border-radius: 4px; cursor: pointer; color: #fff;
            border: 1px solid #444; font-weight: bold;
        }

        .terminal-container { flex-grow: 1; margin: 5px; border: 1px solid #222; background: rgba(0, 8, 0, 0.98); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #term-scroll { flex-grow: 1; padding: 12px; overflow-y: auto; font-size: 0.85em; line-height: 1.4; scroll-behavior: smooth; }
        
        /* Settings Overlay */
        #settings-modal {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 300; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content { border: 1px solid var(--neon); padding: 25px; width: 80%; background: #050505; box-shadow: 0 0 15px var(--neon); }
        .setting-row { margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .setting-btn { 
            display: block; width: 100%; padding: 10px; margin: 5px 0; 
            background: #111; color: var(--neon); border: 1px solid var(--neon); cursor: pointer;
        }
        .setting-btn:active { background: var(--neon); color: #000; }

        .input-line { padding: 10px; border-top: 1px solid #1a1a1a; display: flex; align-items: center; min-height: 20px; }
        .prompt { font-weight: bold; margin-right: 6px; }
        .cursor { display: inline-block; width: 8px; height: 14px; background: var(--neon); animation: blink 0.8s infinite; }
        
        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 5px; background: #050505; height: 240px; }
        .key { background: rgba(0, 255, 65, 0.05); border: 1px solid #222; color: var(--neon); display: flex; align-items: center; justify-content: center; font-size: 1.3em; border-radius: 4px; }
        .key:active { background: var(--neon); color: #000; }

        /* Overlays */
        #loading-screen, #dummy-id { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .progress-bar { width: 80%; height: 10px; border: 1px solid var(--neon); margin-top: 15px; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: var(--neon); transition: width 0.1s; }
        .loot-btn { margin-top: 20px; background: var(--warn); color: #000; border: none; padding: 15px 30px; font-weight: bold; animation: pulse 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header-bar">
    <div>TIME: <span id="timer-display">OFFLINE</span></div>
    <div style="display:flex; align-items:center; gap:10px;">
        <span id="cash-display" style="color:var(--warn)">$0</span>
        <div class="settings-icon" onclick="toggleSettings()">⚙️ SETTINGS</div>
    </div>
</div>

<div class="terminal-container" id="ui-main">
    <div id="term-scroll">
        <div style="color: #444;">[SYSTEM_LINK_ACTIVE] WAITING FOR TARGET...</div>
        <div id="game-logs"></div>
        <div id="active-input" style="display:none;" class="input-line">
            <span class="prompt">root@hack:~#</span><span id="current-typing"></span><span class="cursor"></span>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settings-modal">
        <div class="modal-content">
            <h3 style="color:var(--warn); margin-top:0;">SYSTEM CONFIG</h3>
            <div class="setting-row">
                <label>INJECTION LEVEL:</label>
                <button class="setting-btn" onclick="setDifficulty(300, 'BEGINNER')">BEGINNER (5:00)</button>
                <button class="setting-btn" onclick="setDifficulty(60, 'PROFESSIONAL')">PROFESSIONAL (1:00)</button>
                <button class="setting-btn" onclick="setDifficulty(30, 'ELITE')">ELITE (0:30)</button>
            </div>
            <button class="setting-btn" style="border-color:#fff; color:#fff;" onclick="toggleSettings()">CLOSE</button>
        </div>
    </div>

    <div id="loading-screen">
        <div id="loading-text">BYPASSING FIREWALL...</div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
    </div>

    <div id="dummy-id">
        <div style="border:1px solid var(--warn); padding:20px; background:#050505; color:#fff; width:80%;">
            <h3 style="color:var(--neon)">ACCESS GRANTED</h3>
            <p>USER: admin_global_04</p>
            <p>ASSETS: $450,000.00</p>
            <button class="loot-btn" onclick="collectLoot()">[ STEAL ASSETS ]</button>
        </div>
    </div>
</div>

<div class="keypad">
    <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
    <div class="key" style="color:var(--fail)" onclick="press('DEL')">⌫</div><div class="key" onclick="press('0')">0</div><div class="key" style="color:var(--neon)" onclick="press('ENT')">EXE</div>
</div>

<script>
    const logs = document.getElementById('game-logs');
    const termScroll = document.getElementById('term-scroll');
    const currentTyping = document.getElementById('current-typing');
    const inputLine = document.getElementById('active-input');
    
    let secret = "", timeLeft = 0, cash = parseInt(localStorage.getItem('h_cash')) || 0;
    let gameActive = false, timerStarted = false, inputBuffer = "";

    document.getElementById('cash-display').innerText = "$" + cash.toLocaleString();

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
    }

    function setDifficulty(sec, lvl) {
        secret = Math.floor(1000 + Math.random() * 9000).toString();
        timeLeft = sec;
        gameActive = true;
        timerStarted = false; // Reset timer for new game
        toggleSettings();
        logs.innerHTML = ""; // Clear old logs
        inputLine.style.display = 'flex';
        updateTime();
        print(`[!] TARGET SYSTEM: ${lvl} LOCKED.`, "var(--warn)");
    }

    function updateTime() {
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function press(key) {
        if (!gameActive) return;
        if (key === 'DEL') inputBuffer = inputBuffer.slice(0, -1);
        else if (key === 'ENT') {
            if (inputBuffer.length === 4) {
                if (!timerStarted) startTimer();
                submitGuess(inputBuffer);
                inputBuffer = "";
                currentTyping.innerText = "";
            }
        } else if (inputBuffer.length < 4) inputBuffer += key;
        currentTyping.innerText = inputBuffer;
    }

    function startTimer() {
        timerStarted = true;
        const itv = setInterval(() => {
            if (!gameActive) { clearInterval(itv); return; }
            timeLeft--; updateTime();
            if (timeLeft <= 0) { 
                alert("TRACE DETECTED! CONNECTION LOST.");
                location.reload(); 
            }
        }, 1000);
    }

    async function print(text, color = "var(--neon)") {
        const d = document.createElement('div');
        d.style.color = color; d.style.marginBottom = "5px";
        d.innerHTML = text;
        logs.appendChild(d);
        termScroll.scrollTop = termScroll.scrollHeight;
    }

    async function submitGuess(guess) {
        let exact = 0, partial = 0;
        let sArr = secret.split(''), gArr = guess.split('');
        for(let i=0; i<4; i++) if(gArr[i]===sArr[i]) { exact++; sArr[i]=gArr[i]=null; }
        for(let i=0; i<4; i++) if(gArr[i]!==null && sArr.includes(gArr[i])) { partial++; sArr[sArr.indexOf(gArr[i])]=null; }

        await print(`root@hack:~# ${guess} -> <span style="color:var(--warn)">[MATCH:${exact} | DATA:${partial}]</span>`);

        if (exact === 4) {
            gameActive = false;
            await print("------------------------------------", "#fff");
            await print("SUCCESS: PIN MATCHED.", "var(--neon)");
            setTimeout(showLoading, 3000);
        }
    }

    function showLoading() {
        document.getElementById('loading-screen').style.display = "flex";
        let width = 0;
        let fill = document.getElementById('p-fill');
        let interval = setInterval(() => {
            width += 4;
            fill.style.width = width + "%";
            if (width >= 100) { clearInterval(interval); showDummyID(); }
        }, 120);
    }

    function showDummyID() {
        document.getElementById('loading-screen').style.display = "none";
        document.getElementById('dummy-id').style.display = "flex";
    }

    function collectLoot() {
        let reward = Math.floor(Math.random() * 500000) + 100000;
        cash += reward;
        localStorage.setItem('h_cash', cash);
        location.reload();
    }
</script>
</body>
</html>
